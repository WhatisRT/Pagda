# Reusable CI workflow for pagda projects.
name: pagda CI

on:
  workflow_call:
    inputs:
      pages:
        description: Build the documentation and optionally deploy it to GitHub Pages.
        type: boolean
        default: false
      deploy:
        description: >-
          Deploy the built docs to GitHub Pages (the default). Set false to
          instead upload them as a plain `docs` artifact, so your own workflow
          can fold them into an existing Pages site rather than have pagda own
          the deploy.
        type: boolean
        default: true
      cache:
        description: Cache the Nix store via the GitHub Actions cache.
        type: boolean
        default: false
      working-directory:
        description: >-
          Directory holding the project's flake, relative to the repository
          root. Set this for a flake that does not live at the repo root.
        type: string
        default: "."
      gc-max-store-size:
        description: >-
          Trim the Nix store to this size before caching it.
        type: string
        default: "1G"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: WhatisRT/pagda/.github/actions/setup@main
        with:
          cache: ${{ inputs.cache }}
          gc-max-store-size: ${{ inputs.gc-max-store-size }}
      - name: Type-check the library
        run: nix build .#default -L

  # Build the documentation on the default branch (only when the caller passes
  # pages: true). With deploy: true it uploads the GitHub Pages artifact for the
  # deploy job below; with deploy: false it uploads a plain `docs` artifact for
  # the caller to compose into its own deploy.
  docs:
    if: inputs.pages && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: WhatisRT/pagda/.github/actions/setup@main
        with:
          cache: ${{ inputs.cache }}
          gc-max-store-size: ${{ inputs.gc-max-store-size }}
      - name: Build the documentation
        run: nix build .#docs -L
      # Copy to a repo-root `public` so the upload path is the same regardless
      # of working-directory.
      - name: Prepare the docs
        run: cp -rL --no-preserve=mode,ownership result "$GITHUB_WORKSPACE/public"
      - if: inputs.deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - if: ${{ !inputs.deploy }}
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: public

  deploy:
    if: inputs.pages && inputs.deploy && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: docs
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
