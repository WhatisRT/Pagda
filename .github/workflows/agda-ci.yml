# Reusable CI workflow for pagda projects.
name: pagda CI

on:
  workflow_call:
    inputs:
      pages:
        description: Build the documentation and deploy it to GitHub Pages.
        type: boolean
        default: false
      cache:
        description: Cache the Nix store via the GitHub Actions cache.
        type: boolean
        default: false
      working-directory:
        description: >-
          Directory holding the project's flake, relative to the repository
          root. Set this for a flake that does not live at the repo root.
        type: string
        default: "."
      gc-max-store-size:
        description: >-
          Trim the Nix store to this size before caching it.
        type: string
        default: "1G"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: WhatisRT/pagda/.github/actions/setup@main
        with:
          cache: ${{ inputs.cache }}
          gc-max-store-size: ${{ inputs.gc-max-store-size }}
      - name: Type-check the library
        run: nix build .#default -L

  # Build the documentation and publish it to GitHub Pages on the default branch
  # (only when the caller passes pages: true). The caller must grant pages/
  # id-token write permissions and set the repository's Pages source to "GitHub
  # Actions".
  docs:
    if: inputs.pages && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: WhatisRT/pagda/.github/actions/setup@main
        with:
          cache: ${{ inputs.cache }}
          gc-max-store-size: ${{ inputs.gc-max-store-size }}
      - name: Build the documentation
        run: nix build .#docs -L
      # Copy to a repo-root `public` so the upload path is the same regardless
      # of working-directory.
      - name: Prepare the Pages artifact
        run: cp -rL --no-preserve=mode,ownership result "$GITHUB_WORKSPACE/public"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
