# Shared setup for pagda CI jobs: check out the repo, install Nix, and
# optionally cache the Nix store.
name: Set up pagda
description: Check out the repository, install Nix, and optionally cache the Nix store.

inputs:
  cache:
    description: Cache the Nix store via the GitHub Actions cache.
    default: "false"
  gc-max-store-size:
    description: >-
      Trim the Nix store to this size before caching it.
    default: "1G"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          keep-outputs = true
          keep-derivations = true
    - if: inputs.cache == 'true'
      name: Cache the Nix store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: ${{ inputs.gc-max-store-size }}
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-last-accessed: P1DT12H
        purge-primary-key: never
